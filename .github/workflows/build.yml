name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android Build Dependencies
        run: |
          # 1. Limpiar listas previas que puedan estar corruptas
          sudo rm -rf /var/lib/apt/lists/*
          
          # 2. Forzar a apt a ignorar errores de repositorios externos/caídos
          sudo apt-get update -o Acquire::AllowInsecureRepositories=true -o Acquire::AllowDowngradeToInsecureRepositories=true || true
          
          # 3. Solución al bloqueo de Ubuntu: Instalar libunwind-dev explícitamente primero
          sudo apt-get install -y libunwind-dev

          # 4. Instalar todas las dependencias necesarias de Kivy/Buildozer
          sudo apt-get install -y --fix-missing \
            git zip unzip autoconf automake libtool m4 pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev \
            libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev cmake ninja-build \
            libgtk-3-dev libgstreamer1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            libjpeg-dev

      - name: Install Buildozer and Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer "Cython<3.0" virtualenv pycparser

      # --- SISTEMA DE CACHÉ (Forzado v2 para obligar a reconstruir con Plyer) ---
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-v2-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v2-

      - name: Cache Android SDK/NDK downloads
        uses: actions/cache@v4
        with:
          path: ~/.android
          key: ${{ runner.os }}-android-v2-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-android-v2-

      # --- COMPILACIÓN DEL APK (Aceptando licencias automáticamente y reduciendo RAM) ---
      - name: Build APK (Auto-accepting licenses)
        env:
          # Evita conflictos con NDKs preinstalados en GitHub Actions
          ANDROID_NDK_HOME: ""
          ANDROID_NDK_ROOT: ""
          ANDROID_NDK_LATEST_HOME: ""
        run: |
          # Limitar la compilación a 1 solo hilo para no agotar los 7GB de RAM de GitHub
          export JOBS=1
          export MAKEFLAGS="-j1"
          
          # 'yes |' responde automáticamente "y" a las licencias de Android
          yes | buildozer -v android debug 2>&1 | tee build.log

      # Guardar el APK generado si todo sale bien
      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-digital
          path: bin/*.apk
          if-no-files-found: error

      # Guardar los registros/logs de error si la compilación falla
      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
