name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android Build Dependencies
        run: |
          # 1. Limpiar listas previas que puedan estar corruptas
          sudo rm -rf /var/lib/apt/lists/*
          
          # 2. Forzar a apt a ignorar errores de repositorios externos/caídos
          sudo apt-get update -o Acquire::AllowInsecureRepositories=true -o Acquire::AllowDowngradeToInsecureRepositories=true || true
          
          # 3. Instalar dependencias ignorando fallos de paquetes no críticos (--fix-missing)
          sudo apt-get install -y --fix-missing \
            git zip unzip autoconf automake libtool m4 pkg-config \
            zlib1g-dev libncurses5-dev libgdbm-dev libssl-dev \
            libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev \
            libreadline-dev liblzma-dev cmake ninja-build \
            libgtk-3-dev libgstreamer1.0-dev \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            libjpeg-dev

      - name: Install Buildozer and Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer "Cython<3.0" virtualenv pycparser

      - name: Create Buildozer Config Cache Directory
        run: mkdir -p ~/.buildozer

      - name: Accept Android SDK Licenses
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build APK
        env:
          ANDROID_NDK_HOME: ""
          ANDROID_NDK_ROOT: ""
          ANDROID_NDK_LATEST_HOME: ""
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
